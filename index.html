<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candy Match</title>
<style>
  * { box-sizing: border-box; user-select: none; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Trebuchet MS', 'Comic Sans MS', sans-serif;
    background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 50%, #a18cd1 100%);
    color: #fff;
    text-align: center;
    margin: 0;
    padding: 16px;
    min-height: 100vh;
  }
  body.level2 {
    background: linear-gradient(135deg, #2c3e50 0%, #4a148c 50%, #880e4f 100%);
  }
  body.victory {
    background: linear-gradient(135deg, #fceabb 0%, #f8b500 50%, #f83600 100%);
  }
  h1 {
    font-size: 40px; margin: 8px 0;
    text-shadow: 3px 3px 0 #d96fa8, 6px 6px 12px rgba(0,0,0,0.25);
    letter-spacing: 2px;
  }
  body.level2 h1 { text-shadow: 3px 3px 0 #4a148c, 6px 6px 12px rgba(0,0,0,0.5); }
  body.victory h1 { text-shadow: 3px 3px 0 #b71c1c, 6px 6px 12px rgba(0,0,0,0.4); }
  .panel {
    background: rgba(255,255,255,0.18);
    backdrop-filter: blur(10px);
    border-radius: 16px; padding: 14px 18px;
    margin: 12px auto; max-width: 600px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.15);
  }
  .stats { display: flex; justify-content: space-around; flex-wrap: wrap; gap: 8px; }
  .stat { min-width: 70px; }
  .stat-label { font-size: 11px; opacity: 0.85; text-transform: uppercase; letter-spacing: 1px; }
  .stat-value { font-size: 26px; font-weight: bold; text-shadow: 2px 2px 0 rgba(0,0,0,0.2); }
  .progress-wrap {
    margin-top: 10px;
    background: rgba(0,0,0,0.25);
    border-radius: 20px;
    height: 22px; overflow: hidden;
    box-shadow: inset 0 2px 6px rgba(0,0,0,0.3);
    position: relative;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #feca57, #ff6b9d, #a55eea);
    width: 0%;
    transition: width 0.4s ease;
    box-shadow: 0 0 12px rgba(255,255,255,0.5);
  }
  .progress-text {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: bold;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.7);
    letter-spacing: 1px;
  }
  #comboMsg {
    font-size: 26px; font-weight: bold; min-height: 34px; margin: 6px 0;
    color: #fff8a3; text-shadow: 2px 2px 0 #ff5e87, 0 0 20px #fff;
    transition: transform 0.2s;
  }
  #comboMsg.pop { animation: msgPop 0.5s ease-out; }
  @keyframes msgPop {
    0%   { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    60%  { transform: scale(1.3) rotate(5deg);   opacity: 1; }
    100% { transform: scale(1)   rotate(0);      opacity: 1; }
  }
  #board {
    display: grid;
    grid-template-columns: repeat(8, 58px);
    grid-template-rows: repeat(8, 58px);
    gap: 4px;
    background: rgba(255,255,255,0.25);
    padding: 10px; border-radius: 16px;
    margin: 16px auto; width: max-content;
    box-shadow: inset 0 4px 12px rgba(0,0,0,0.15), 0 12px 30px rgba(0,0,0,0.2);
  }
  body.level2 #board {
    background: rgba(0,0,0,0.3);
    box-shadow: inset 0 4px 12px rgba(0,0,0,0.5), 0 12px 30px rgba(255,0,100,0.3);
  }
  .cell {
    width: 58px; height: 58px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px; line-height: 1;
    cursor: pointer; position: relative;
    transition: transform 0.15s, box-shadow 0.15s;
  }
  .cell:hover { transform: scale(1.06); }
  .cell.selected {
    transform: scale(1.2);
    box-shadow: 0 0 0 4px #fff44c, 0 0 24px #fff44c;
    z-index: 5;
    animation: wiggle 0.6s infinite;
  }
  @keyframes wiggle {
    0%,100% { transform: scale(1.2) rotate(0deg); }
    25%     { transform: scale(1.2) rotate(-6deg); }
    75%     { transform: scale(1.2) rotate(6deg); }
  }
  .cell.matched { animation: pop 0.4s ease-out forwards; pointer-events: none; }
  @keyframes pop {
    0%   { transform: scale(1);   opacity: 1; }
    40%  { transform: scale(1.5) rotate(15deg);  opacity: 0.9; }
    100% { transform: scale(0)   rotate(180deg); opacity: 0; }
  }
  .cell.empty { background: rgba(255,255,255,0.08) !important; cursor: default; }
  .cell.empty:hover { transform: none; }
  .cell.hint {
    box-shadow: 0 0 0 3px #fff44c, 0 0 20px #fff44c !important;
    animation: wiggle 0.6s infinite;
  }
  .t0 { background: linear-gradient(135deg, #ff6b6b, #ee5253); }
  .t1 { background: linear-gradient(135deg, #ffa502, #ff7f00); }
  .t2 { background: linear-gradient(135deg, #feca57, #ff9f43); }
  .t3 { background: linear-gradient(135deg, #26de81, #20bf6b); }
  .t4 { background: linear-gradient(135deg, #48dbfb, #0abde3); }
  .t5 { background: linear-gradient(135deg, #a55eea, #8854d0); }
  .t6 { background: linear-gradient(135deg, #ff4757, #c44569); }
  .t7 { background: linear-gradient(135deg, #00d2d3, #01a3a4); }
  .controls { margin-top: 8px; }
  button {
    padding: 12px 24px; font-size: 16px; font-weight: bold; color: #fff;
    background: linear-gradient(135deg, #ff6b9d, #ff4789);
    border: none; border-radius: 30px; cursor: pointer; margin: 6px;
    box-shadow: 0 6px 0 #b5306a, 0 8px 16px rgba(0,0,0,0.25);
    transition: all 0.1s; letter-spacing: 1px;
  }
  button:hover { filter: brightness(1.1); }
  button:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #b5306a, 0 4px 8px rgba(0,0,0,0.25);
  }
  button.secondary {
    background: linear-gradient(135deg, #6ba8ff, #4789ff);
    box-shadow: 0 6px 0 #2a5fb8, 0 8px 16px rgba(0,0,0,0.25);
  }
  button.gold {
    background: linear-gradient(135deg, #ffd700, #ff8c00);
    box-shadow: 0 6px 0 #b8860b, 0 8px 16px rgba(0,0,0,0.25);
  }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    display: none; align-items: center; justify-content: center;
    z-index: 100; backdrop-filter: blur(6px);
  }
  #overlay.show { display: flex; animation: fadeIn 0.3s; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  #modal {
    background: linear-gradient(135deg, #fff5f8, #ffe6f0);
    color: #5a2a4a;
    padding: 36px 48px; border-radius: 24px;
    text-align: center;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
    max-width: 90%;
    animation: modalIn 0.5s ease-out;
  }
  @keyframes modalIn {
    0%   { transform: scale(0.5) rotate(-10deg); opacity: 0; }
    70%  { transform: scale(1.05) rotate(2deg); }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  #modal h2 { font-size: 32px; margin: 0 0 12px; color: #d63384; }
  #modal.victory { background: linear-gradient(135deg, #fff9c4, #ffe082); }
  #modal.victory h2 { color: #b71c1c; font-size: 40px; }
  #modal.lose { background: linear-gradient(135deg, #cfd8dc, #90a4ae); }
  #modal.lose h2 { color: #37474f; }
  #modal p  { font-size: 20px; margin: 8px 0; }
  #modal .score-big { font-size: 44px; font-weight: bold; color: #ff4789; margin: 12px 0; }
  #modal.victory .score-big { color: #b71c1c; }
  #modal.lose .score-big { color: #37474f; }
  #modal .badge {
    display: inline-block; background: gold; color: #5a2a4a;
    padding: 4px 12px; border-radius: 20px;
    font-size: 13px; margin: 4px; font-weight: bold;
  }
  .trophy {
    font-size: 80px;
    animation: trophyBounce 1s ease-out infinite;
  }
  @keyframes trophyBounce {
    0%,100% { transform: translateY(0) rotate(-5deg); }
    50%     { transform: translateY(-15px) rotate(5deg); }
  }
  .confetti {
    position: fixed; top: -10px; font-size: 30px;
    pointer-events: none; z-index: 200;
    animation: confettiFall 3s linear forwards;
  }
  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  .footer { margin-top: 14px; font-size: 13px; opacity: 0.85; }
  #errBox {
    display: none; background: #ff4757; color: #fff;
    padding: 12px; border-radius: 8px;
    margin: 12px auto; max-width: 540px;
    font-family: monospace; font-size: 13px;
    text-align: left; white-space: pre-wrap;
  }
</style>
</head>
<body>
  <h1 id="title">🍭 CANDY MATCH 🍬</h1>
  <div id="errBox"></div>

  <div class="panel stats">
    <div class="stat"><div class="stat-label">Level</div><div class="stat-value" id="level">1</div></div>
    <div class="stat"><div class="stat-label">Score</div><div class="stat-value" id="score">0</div></div>
    <div class="stat"><div class="stat-label">Target</div><div class="stat-value" id="target">1500</div></div>
    <div class="stat"><div class="stat-label">Moves</div><div class="stat-value" id="moves">30</div></div>
    <div class="stat"><div class="stat-label">Combo</div><div class="stat-value" id="combo">x1</div></div>
    <div class="stat"><div class="stat-label">Best</div><div class="stat-value" id="best">0</div></div>
  </div>

  <div class="panel">
    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
      <div class="progress-text" id="progressText">0 / 1500</div>
    </div>
  </div>

  <div id="comboMsg"></div>
  <div id="board"></div>

  <div class="controls">
    <button onclick="newGame()">🔄 New Game</button>
    <button class="secondary" onclick="showHint()">💡 Hint</button>
  </div>

  <div class="footer">Click a candy, then click an adjacent one to swap. Match 3 or more in a row! Cascades = combos!</div>

  <div id="overlay">
    <div id="modal">
      <h2 id="modalTitle">🎉 Game Over!</h2>
      <p>You scored</p>
      <div class="score-big" id="finalScore">0</div>
      <div id="badges"></div>
      <p style="margin-top:18px;"><button onclick="closeModal()">Play Again</button></p>
    </div>
  </div>

<script>
  window.addEventListener('error', function(e) {
    var box = document.getElementById('errBox');
    if (box) { box.style.display = 'block'; box.textContent = '⚠️ Error: ' + e.message + '\n' + (e.error && e.error.stack || ''); }
  });

  var ROWS = 8, COLS = 8;
  var CANDY_GLYPHS = ['A', 'B', 'C', 'D', 'E', 'F'];
  var CANDY_EMOJI  = ['🍬', '🍭', '🍫', '🍩', '🍪', '🧁', '🍰', '🍓'];

  // Level configuration
  var LEVELS = [
    { level: 1, name: 'Sweet Beginnings',  target: 1500, moves: 30, candyTypes: 6, candyEmoji: ['🍬', '🍭', '🍫', '🍩', '🍪', '🧁'] },
    { level: 2, name: 'Sugar Storm',       target: 3000, moves: 25, candyTypes: 7, candyEmoji: ['🍬', '🍭', '🍫', '🍩', '🍪', '🧁', '🍰'] }
  ];

  var board = [], score = 0, moves = 0, currentLevel = 1, currentTarget = 1500;
  var candyTypes = 6, candyEmoji = CANDY_EMOJI;
  var selected = null, isAnimating = false, comboCount = 0;
  var hintCell = null, hintTimeout = null, bestScore = 0;
  var level1HighScore = 0, gameCompleted = false;

  try {
    bestScore = parseInt(localStorage.getItem('candyBest') || '0', 10) || 0;
    level1HighScore = parseInt(localStorage.getItem('candyL1') || '0', 10) || 0;
  } catch (e) { bestScore = 0; level1HighScore = 0; }

  function newGame() {
    currentLevel = 1; gameCompleted = false;
    setupLevel(1);
  }

  function setupLevel(lvl) {
    currentLevel = lvl;
    var cfg = LEVELS[lvl - 1];
    currentTarget = cfg.target;
    moves = cfg.moves;
    candyTypes = cfg.candyTypes;
    candyEmoji = cfg.candyEmoji;
    score = 0; selected = null; hintCell = null;
    if (hintTimeout) { clearTimeout(hintTimeout); hintTimeout = null; }
    comboCount = 0; isAnimating = false;
    var msgEl = document.getElementById('comboMsg');
    if (msgEl) msgEl.textContent = '';

    // Update body theme
    document.body.classList.remove('level2', 'victory');
    if (lvl === 2) document.body.classList.add('level2');

    // Update title
    var titleEl = document.getElementById('title');
    if (titleEl) {
      if (lvl === 1) titleEl.textContent = '🍭 CANDY MATCH 🍬';
      else titleEl.textContent = '⚡ SUGAR STORM ⚡';
    }

    initBoard(); renderBoard(); updateUI();
  }

  function initBoard() {
    board = [];
    for (var r = 0; r < ROWS; r++) {
      board[r] = [];
      for (var c = 0; c < COLS; c++) board[r][c] = randomCandy(r, c);
    }
  }

  function randomCandy(row, col) {
    var banned = {};
    if (col >= 2 && board[row][col-1] === board[row][col-2]) banned[board[row][col-1]] = true;
    if (row >= 2 && board[row-1][col] === board[row-2][col]) banned[board[row-1][col]] = true;
    var choices = [];
    for (var i = 0; i < candyTypes; i++) if (!banned[i]) choices.push(i);
    if (choices.length === 0) for (var j = 0; j < candyTypes; j++) choices.push(j);
    return choices[Math.floor(Math.random() * choices.length)];
  }

  function renderBoard() {
    var boardEl = document.getElementById('board');
    if (!boardEl) return;
    boardEl.innerHTML = '';
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var cell = document.createElement('div');
        cell.className = 'cell';
        cell.setAttribute('data-row', r);
        cell.setAttribute('data-col', c);
        var type = board[r][c];
        if (type === -1 || type === undefined || type === null) {
          cell.classList.add('empty');
        } else {
          cell.className = 'cell t' + type;
          cell.textContent = candyEmoji[type] || CANDY_GLYPHS[type] || '?';
          (function(rr, cc) { cell.onclick = function() { handleClick(rr, cc); }; })(r, c);
        }
        boardEl.appendChild(cell);
      }
    }
    if (selected) {
      var sel = document.querySelector('.cell[data-row="'+selected.r+'"][data-col="'+selected.c+'"]');
      if (sel) sel.classList.add('selected');
    }
    if (hintCell) {
      var h = document.querySelector('.cell[data-row="'+hintCell.r+'"][data-col="'+hintCell.c+'"]');
      if (h) h.classList.add('hint');
    }
  }

  function handleClick(r, c) {
    if (isAnimating || moves <= 0 || gameCompleted) return;
    if (board[r][c] === -1 || board[r][c] === undefined) return;
    hintCell = null;
    if (hintTimeout) { clearTimeout(hintTimeout); hintTimeout = null; }

    if (!selected) { selected = { r: r, c: c }; renderBoard(); return; }
    if (selected.r === r && selected.c === c) { selected = null; renderBoard(); return; }

    var dr = Math.abs(selected.r - r), dc = Math.abs(selected.c - c);
    var prev = selected; selected = null;
    if ((dr === 1 && dc === 0) || (dr === 0 && dc === 1)) trySwap(prev.r, prev.c, r, c);
    else { selected = { r: r, c: c }; renderBoard(); }
  }

  async function trySwap(r1, c1, r2, c2) {
    isAnimating = true; moves--; comboCount = 0;
    var tmp = board[r1][c1]; board[r1][c1] = board[r2][c2]; board[r2][c2] = tmp;
    renderBoard(); await sleep(150);

    var matches = findMatches();
    if (matches.length === 0) {
      tmp = board[r1][c1]; board[r1][c1] = board[r2][c2]; board[r2][c2] = tmp;
      moves++; renderBoard(); isAnimating = false; updateUI(); return;
    }
    await processCascade();
    isAnimating = false; updateUI(); checkProgress();
  }

  function findMatches() {
    var matched = {};
    for (var r = 0; r < ROWS; r++) {
      var runStart = 0;
      for (var c = 1; c <= COLS; c++) {
        var sameAsPrev = (c < COLS) && board[r][c] !== -1 && board[r][c] === board[r][c-1];
        if (!sameAsPrev) {
          if (c - runStart >= 3 && board[r][runStart] !== -1) {
            for (var i = runStart; i < c; i++) matched[r + ',' + i] = true;
          }
          runStart = c;
        }
      }
    }
    for (var cc = 0; cc < COLS; cc++) {
      var vRunStart = 0;
      for (var rr = 1; rr <= ROWS; rr++) {
        var sameAsPrev = (rr < ROWS) && board[rr][cc] !== -1 && board[rr][cc] === board[rr-1][cc];
        if (!sameAsPrev) {
          if (rr - vRunStart >= 3 && board[vRunStart][cc] !== -1) {
            for (var i = vRunStart; i < rr; i++) matched[i + ',' + cc] = true;
          }
          vRunStart = rr;
        }
      }
    }
    var out = [];
    for (var key in matched) if (matched.hasOwnProperty(key)) {
      var parts = key.split(','); out.push([parseInt(parts[0], 10), parseInt(parts[1], 10)]);
    }
    return out;
  }

  async function processCascade() {
    var matches = findMatches(); var cascade = 0;
    while (matches.length > 0) {
      cascade++; comboCount = cascade; var multiplier = cascade;
      score += matches.length * 10 * multiplier; updateUI();

      var msgEl = document.getElementById('comboMsg');
      if (msgEl) {
        if (cascade === 1) {
          msgEl.textContent = matches.length >= 5 ? '★ SPECTACULAR!' : matches.length === 4 ? '✦ SWEET!' : '';
        } else {
          var labels = ['', '', 'DOUBLE x2!', 'TRIPLE x3!', 'QUAD x4!', 'MEGA x5!', 'ULTRA x6!', 'CRAZY x7!'];
          msgEl.textContent = labels[Math.min(cascade, labels.length-1)] || 'COMBO!';
        }
        msgEl.classList.remove('pop'); void msgEl.offsetWidth; msgEl.classList.add('pop');
      }

      var allCells = document.querySelectorAll('.cell');
      for (var i = 0; i < matches.length; i++) {
        var idx = matches[i][0] * COLS + matches[i][1];
        if (allCells[idx]) allCells[idx].classList.add('matched');
      }
      await sleep(380);

      for (var j = 0; j < matches.length; j++) board[matches[j][0]][matches[j][1]] = -1;
      applyGravity(); refillEmpty(); renderBoard();
      await sleep(280);
      matches = findMatches();
    }
    if (cascade > 0) await sleep(500);
    if (msgEl) msgEl.textContent = '';
  }

  function applyGravity() {
    for (var c = 0; c < COLS; c++) {
      var writeRow = ROWS - 1;
      for (var r = ROWS - 1; r >= 0; r--) {
        if (board[r][c] !== -1) {
          board[writeRow][c] = board[r][c];
          if (writeRow !== r) board[r][c] = -1;
          writeRow--;
        }
      }
      for (var r2 = writeRow; r2 >= 0; r2--) board[r2][c] = -1;
    }
  }

  function refillEmpty() {
    for (var c = 0; c < COLS; c++) {
      for (var r = 0; r < ROWS; r++) {
        if (board[r][c] === -1) board[r][c] = Math.floor(Math.random() * candyTypes);
      }
    }
  }

  function showHint() {
    if (isAnimating || moves <= 0 || gameCompleted) return;
    var move = findAnyValidMove();
    if (move) {
      hintCell = move; renderBoard();
      if (hintTimeout) clearTimeout(hintTimeout);
      hintTimeout = setTimeout(function() { hintCell = null; hintTimeout = null; renderBoard(); }, 2500);
    } else { alert('No moves available — start a new game!'); }
  }

  function findAnyValidMove() {
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (board[r][c] === -1) continue;
        if (c + 1 < COLS && board[r][c+1] !== -1) {
          var t = board[r][c]; board[r][c] = board[r][c+1]; board[r][c+1] = t;
          var ok = findMatches().length > 0;
          t = board[r][c]; board[r][c] = board[r][c+1]; board[r][c+1] = t;
          if (ok) return { r: r, c: c };
        }
        if (r + 1 < ROWS && board[r+1][c] !== -1) {
          var t2 = board[r][c]; board[r][c] = board[r+1][c]; board[r+1][c] = t2;
          var ok2 = findMatches().length > 0;
          t2 = board[r][c]; board[r][c] = board[r+1][c]; board[r+1][c] = t2;
          if (ok2) return { r: r, c: c };
        }
      }
    }
    return null;
  }

  function updateUI() {
    var s = document.getElementById('score'), m = document.getElementById('moves');
    var c = document.getElementById('combo'), b = document.getElementById('best');
    var lv = document.getElementById('level'), tg = document.getElementById('target');
    var pb = document.getElementById('progressBar'), pt = document.getElementById('progressText');
    if (s) s.textContent = score;
    if (m) m.textContent = moves;
    if (c) c.textContent = 'x' + Math.max(1, comboCount);
    if (b) b.textContent = bestScore;
    if (lv) lv.textContent = currentLevel;
    if (tg) tg.textContent = currentTarget;
    if (pb) {
      var pct = Math.min(100, (score / currentTarget) * 100);
      pb.style.width = pct + '%';
    }
    if (pt) pt.textContent = score + ' / ' + currentTarget;
  }

  function checkProgress() {
    if (score >= currentTarget) {
      if (currentLevel === 1) {
        if (score > level1HighScore) {
          level1HighScore = score;
          try { localStorage.setItem('candyL1', String(level1HighScore)); } catch (e) {}
        }
        if (score > bestScore) {
          bestScore = score;
          try { localStorage.setItem('candyBest', String(bestScore)); } catch (e) {}
        }
        showLevelUp();
      } else {
        gameCompleted = true;
        if (score > bestScore) {
          bestScore = score;
          try { localStorage.setItem('candyBest', String(bestScore)); } catch (e) {}
        }
        showVictory();
      }
    } else if (moves <= 0) {
      if (score > bestScore) {
        bestScore = score;
        try { localStorage.setItem('candyBest', String(bestScore)); } catch (e) {}
      }
      showGameOver();
    }
  }

  function showLevelUp() {
    var ov = document.getElementById('overlay');
    var modal = document.getElementById('modal');
    var title = document.getElementById('modalTitle');
    var fs = document.getElementById('finalScore');
    var bg = document.getElementById('badges');

    modal.classList.remove('victory', 'lose');
    title.textContent = '🎊 LEVEL 1 CLEARED!';
    fs.textContent = score;

    var badges = ['✅ Target Reached!', '⭐ Score: ' + score];
    if (level1HighScore === score && score > 0) badges.push('🏆 New L1 Best!');
    bg.innerHTML = badges.map(function(b){return '<span class="badge">'+b+'</span>';}).join('');

    var btnContainer = modal.querySelector('p:last-child');
    btnContainer.innerHTML = '<button class="gold" onclick="goToLevel2()">⚡ Start Level 2</button> <button class="secondary" onclick="closeModal()">Replay L1</button>';

    ov.classList.add('show');
  }

  function goToLevel2() {
    var ov = document.getElementById('overlay');
    ov.classList.remove('show');
    var modal = document.getElementById('modal');
    var btnContainer = modal.querySelector('p:last-child');
    btnContainer.innerHTML = '<button onclick="closeModal()">Play Again</button>';
    setupLevel(2);
  }

  function showVictory() {
    var ov = document.getElementById('overlay');
    var modal = document.getElementById('modal');
    var title = document.getElementById('modalTitle');
    var fs = document.getElementById('finalScore');
    var bg = document.getElementById('badges');

    modal.classList.remove('lose');
    modal.classList.add('victory');
    title.innerHTML = '<div class="trophy">🏆</div>YOU WIN!';
    fs.textContent = score;

    var badges = ['👑 Champion!', '🎉 All Levels Cleared!', '⚡ Sugar Storm Survived!'];
    if (score >= 5000) badges.push('🌟 LEGENDARY!');
    if (comboCount >= 5) badges.push('🔥 Combo King');
    if (score === bestScore && score > 0) badges.push('🏆 New Best!');
    bg.innerHTML = badges.map(function(b){return '<span class="badge">'+b+'</span>';}).join('');

    var btnContainer = modal.querySelector('p:last-child');
    btnContainer.innerHTML = '<button class="gold" onclick="closeModal()">🎮 Play Again</button>';

    ov.classList.add('show');
    launchConfetti();
  }

  function showGameOver() {
    var ov = document.getElementById('overlay');
    var modal = document.getElementById('modal');
    var title = document.getElementById('modalTitle');
    var fs = document.getElementById('finalScore');
    var bg = document.getElementById('badges');

    modal.classList.remove('victory');
    modal.classList.add('lose');
    title.textContent = '💔 Out of Moves!';
    fs.textContent = score;

    var badges = ['Level ' + currentLevel + ' Failed'];
    if (score >= currentTarget * 0.75) badges.push('🥈 So Close!');
    if (score >= currentTarget * 0.5) badges.push('🥉 Keep Trying!');
    if (score > bestScore) {
      bestScore = score;
      try { localStorage.setItem('candyBest', String(bestScore)); } catch (e) {}
    }
    if (score === bestScore && score > 0) badges.push('🏆 New Best!');
    bg.innerHTML = badges.map(function(b){return '<span class="badge">'+b+'</span>';}).join('');

    var btnContainer = modal.querySelector('p:last-child');
    btnContainer.innerHTML = '<button onclick="closeModal()">Try Again</button>';

    ov.classList.add('show');
  }

  function launchConfetti() {
    var emojis = ['🎉', '🎊', '⭐', '🌟', '✨', '💖', '🏆', '👑', '🍬', '🍭'];
    for (var i = 0; i < 40; i++) {
      (function(idx) {
        setTimeout(function() {
          var c = document.createElement('div');
          c.className = 'confetti';
          c.textContent = emojis[Math.floor(Math.random() * emojis.length)];
          c.style.left = Math.random() * 100 + 'vw';
          c.style.animationDuration = (2 + Math.random() * 2) + 's';
          c.style.fontSize = (20 + Math.random() * 25) + 'px';
          document.body.appendChild(c);
          setTimeout(function() { if (c.parentNode) c.parentNode.removeChild(c); }, 4000);
        }, idx * 80);
      })(i);
    }
  }

  function closeModal() {
    var ov = document.getElementById('overlay'); if (ov) ov.classList.remove('show');
    var modal = document.getElementById('modal');
    modal.classList.remove('victory', 'lose');
    var btnContainer = modal.querySelector('p:last-child');
    btnContainer.innerHTML = '<button onclick="closeModal()">Play Again</button>';
    newGame();
  }

  function sleep(ms) { return new Promise(function(res) { setTimeout(res, ms); }); }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function() { newGame(); });
  } else { newGame(); }
</script>
</body>
</html>
